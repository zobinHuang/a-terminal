# [vibebox] vibe music — sourced from ~/.tmux.conf at the end of the file.
#
# Hooks here are global (-g) but vbox-music short-circuits when
# @vibe-active-slot is unset, so non-vibe sessions pay essentially nothing.
# The status indicator itself lives directly in main status-right as
# `#(vbox-music tick)` — see setup.sh.

# ─── focus hooks: crossfade to the focused pane's vibe ───────────────
# focus-events lets the terminal forward focus changes to tmux. Some
# terminals don't, in which case after-select-window still fires.
set -g focus-events on
set-hook -g pane-focus-in       'run-shell -b "vbox-music focus #{pane_id}"'
set-hook -g after-select-window 'run-shell -b "vbox-music focus #{pane_id}"'
set-hook -g after-select-pane   'run-shell -b "vbox-music focus #{pane_id}"'

# ─── attach hooks: pause when you detach, resume when you re-attach ──
set-hook -g client-detached         'run-shell -b "vbox-music sync-attached"'
set-hook -g client-attached         'run-shell -b "vbox-music sync-attached"'
set-hook -g client-session-changed  'run-shell -b "vbox-music sync-attached"'

# ─── per-tab uptime: stamp window creation time so vbox-uptime can
#     show "running 5m 30s" relative to when this tab opened, not when
#     the session opened. Set on both new-window AND new-session because
#     the initial window of a new session doesn't trigger new-window.
set-hook -g after-new-window  'set-option -w @vibe-window-created "#{T:%s}"'
set-hook -g after-new-session 'set-option -w @vibe-window-created "#{T:%s}"'

# ─── session-closed: kill mpv when any vibe session ends ────────────
# Must be -g (global): a per-session hook would be torn down with the
# session before it could fire. The handler reaps state files for any
# session tmux no longer has — this avoids depending on hook-format
# variables like #{hook_session} whose name/availability differs across
# tmux versions.
set-hook -g session-closed 'run-shell -b "vbox-music reap"'

# ─── vibe keybindings (Ctrl+t prefix, sharing the existing tab_mode) ─
# m  → toggle global mute (fade current slot to 0 / restore)
# M  → kill mpv processes for this session (re-enable with `vbox new --vibe`)
# ]  → cycle mood UP   (auto → chill → mellow → intense → auto)
# [  → cycle mood DOWN (auto → intense → mellow → chill → auto)
# a  → release manual mood, return to auto
bind -T tab_mode m run-shell -b "vbox-music mute"
bind -T tab_mode M run-shell -b "vbox-music stop"
bind -T tab_mode ] run-shell -b "vbox-music mood next"
bind -T tab_mode [ run-shell -b "vbox-music mood prev"
bind -T tab_mode a run-shell -b "vbox-music mood auto"
