# [vibebox] vibe-level definitions
#
# Format: <label> <glyph> <min_intensity> <max_intensity>
# - One tier per line, whitespace-separated, no quotes.
# - Read top-to-bottom; first row whose [min, max] contains the current
#   intensity wins.
# - The tier's "midpoint" intensity (the value used when the user pins
#   the mood manually with `Ctrl+t ] / [`) is (min + max) / 2.
# - Glyph can be any single token, including a multi-byte Unicode block
#   element. Anything `tmux` can render in status-right is fine.
# - Label is whatever you want shown next to the glyph in the status bar
#   AND the canonical name passed to `vbox-music mood <label>`.
# - Order in this file is the cycle order for `Ctrl+t ]` (next) and
#   `Ctrl+t [` (prev). `Ctrl+t a` always returns to auto.
#
# Re-running setup.sh preserves your edits.

LOOSE  ▂  0.0  0.3
RAISE  ▄  0.3  0.6
TENSE  ▆  0.6  1.0
